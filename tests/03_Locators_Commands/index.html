<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up page for Playwright locator practice - email, password, remember me form">
    <title>Sign Up | Playwright Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            animation: float 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: #6c5ce7;
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: #00cec9;
            bottom: -80px;
            right: -80px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.08); }
        }

        /* Card */
        .signup-card {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
            z-index: 1;
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.5);
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .card-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .card-header p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 400;
        }

        /* Form fields */
        .field-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            transition: color 0.25s;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 13px 14px 13px 44px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Inter', Arial, sans-serif;
            color: #ffffff;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.1);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);
        }

        input[type="email"]:focus + .input-icon,
        input[type="password"]:focus + .input-icon {
            color: #a29bfe;
        }

        /* Password toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
            width: auto;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.8);
            background: none;
            box-shadow: none;
            transform: none;
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
        }

        /* Remember me row */
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .remember-label span {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.65);
        }

        /* Custom checkbox */
        #remember-me {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.06);
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        #remember-me:checked {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }

        #remember-me:checked::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 5px;
            height: 9px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        #remember-me:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.3);
        }

        .forgot-link {
            font-size: 13px;
            color: #a29bfe;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }

        /* Sign Up button */
        #signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', Arial, sans-serif;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.45);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
            position: relative;
            overflow: hidden;
        }

        #signup-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
            border-radius: inherit;
        }

        #signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(108, 92, 231, 0.6);
        }

        #signup-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 14px rgba(108, 92, 231, 0.4);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .divider span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
        }

        /* Sign in link */
        .signin-prompt {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .signin-prompt a {
            color: #a29bfe;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signin-prompt a:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }

        /* Success toast */
        .toast {
            display: none;
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 184, 148, 0.4);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .toast.show {
            display: block;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <div class="signup-card" role="main">

        <!-- Header -->
        <div class="card-header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>
            <h1>Create Account</h1>
            <p>Sign up to get started with Playwright</p>
        </div>

        <!-- Form -->
        <form id="signup-form" novalidate>

            <!-- Email -->
            <div class="field-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a strong password"
                        autocomplete="new-password"
                        required
                    >
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <button
                        type="button"
                        id="toggle-password-btn"
                        class="toggle-password"
                        aria-label="Toggle password visibility"
                        onclick="togglePassword()"
                    >
                        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember Me + Forgot Password -->
            <div class="remember-row">
                <label class="remember-label" for="remember-me">
                    <input type="checkbox" id="remember-me" name="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="#" id="forgot-password-link" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Sign Up Button -->
            <button type="submit" id="signup-btn">Create Account</button>

            <div class="divider"><span>or</span></div>

            <p class="signin-prompt">
                Already have an account? <a href="#" id="signin-link">Sign in</a>
            </p>

        </form>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast" role="alert">🎉 Account created successfully!</div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const isPassword = pwdInput.type === 'password';

            pwdInput.type = isPassword ? 'text' : 'password';

            // Swap icon between open-eye and crossed-eye
            eyeIcon.innerHTML = isPassword
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }

        // Form submission
        document.getElementById('signup-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Please fill in all fields.');
                return;
            }

            // Show success toast
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);

            // Reset form
            this.reset();
        });
    </script>

</body>

</html>
